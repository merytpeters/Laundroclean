name: CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  express-build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: laundroclean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/laundroclean_test
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_jwt_secret' }}
      REFRESH_TOKEN_EXPIRES: 7d
      ACCESS_TOKEN_EXPIRES: 30m

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Create .env for server
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@postgres:5432/laundroclean_test" > .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'test_jwt_secret' }}" >> .env
          echo "REFRESH_TOKEN_EXPIRES=7d" >> .env
          echo "ACCESS_TOKEN_EXPIRES=30m" >> .env

      - name: Wait for Postgres
        run: |
          for i in {1..35}; do
            pg_isready -h postgres -p 5432 -U postgres && echo "Postgres ready" && break
            echo "Waiting for Postgres... ($i/15)"
            sleep 2
          done
          if ! pg_isready -h postgres -p 5432 -U postgres; then
            echo "Postgres did not start in time" >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Show env for debugging
        run: |
          echo "DATABASE_URL=$DATABASE_URL"
          cat .env

      - name: Prisma generate
        run: npm run db:generate

      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
